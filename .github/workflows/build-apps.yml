name: Build macOS and Windows Apps

on:
  # Disabled automatic builds - compile locally and upload manually
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-13
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Generate version
      id: version
      run: |
        VERSION="v1.0.0-beta-$(date +'%Y%m%d-%H%M%S')-$(git rev-parse --short HEAD)"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Generated version: $VERSION"
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    
    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          novasdr_nr_py/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Create virtual environment
      run: |
        cd audio_processor
        python3 -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
    
    - name: Install Python dependencies
      run: |
        cd audio_processor
        source venv/bin/activate
        pip install PyQt5 sounddevice scipy pydub numpy maturin pyinstaller
    
    - name: Build NovaSDR Rust module
      run: |
        cd novasdr_nr_py
        source ../audio_processor/venv/bin/activate
        maturin develop --release
    
    - name: Verify NovaSDR module
      run: |
        cd audio_processor
        source venv/bin/activate
        python3 -c "import novasdr_nr; print('✓ NovaSDR loaded:', novasdr_nr.__file__)"
    
    - name: Build macOS app
      run: |
        cd audio_processor
        source venv/bin/activate
        ./build_macos.sh
    
    - name: Remove quarantine attributes
      run: |
        cd audio_processor/dist
        xattr -cr LU2MET_NR.app
        find LU2MET_NR.app -type f -exec xattr -c {} \;
    
    - name: Create versioned ZIP
      run: |
        cd audio_processor/dist
        zip -r LU2MET_NR-macos-${{ steps.version.outputs.version }}.zip LU2MET_NR.app
    
    - name: Upload macOS app
      uses: actions/upload-artifact@v4
      with:
        name: LU2MET_NR-macos-${{ steps.version.outputs.version }}
        path: audio_processor/dist/LU2MET_NR-macos-${{ steps.version.outputs.version }}.zip
        retention-days: 90

  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Generate version
      id: version
      run: |
        $VERSION = "v1.0.0-beta-$(Get-Date -Format 'yyyyMMdd-HHmmss')-$(git rev-parse --short HEAD)"
        echo "version=$VERSION" >> $env:GITHUB_OUTPUT
        echo "Generated version: $VERSION"
      shell: pwsh
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        rustflags: ""
    
    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          novasdr_nr_py/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Create virtual environment and upgrade pip (Windows)
      if: runner.os == 'Windows'
      working-directory: audio_processor
      shell: pwsh
      run: |
        python -m venv venv
        .\venv\Scripts\Activate.ps1
        python -m pip install --upgrade pip
    
    - name: Install Python dependencies
      working-directory: audio_processor
      run: |
        .\venv\Scripts\Activate.ps1
        pip install PyQt5 sounddevice scipy pydub numpy maturin pyinstaller
      shell: pwsh
    
    - name: Build NovaSDR Rust module
      working-directory: novasdr_nr_py
      run: |
        ..\audio_processor\venv\Scripts\Activate.ps1
        maturin develop --release
      shell: pwsh
    
    - name: Verify NovaSDR module
      working-directory: audio_processor
      run: |
        .\venv\Scripts\Activate.ps1
        python -c "import novasdr_nr; print('NovaSDR loaded:', novasdr_nr.__file__)"
      shell: pwsh
    
    - name: Build Windows app
      working-directory: audio_processor
      run: |
        .\venv\Scripts\Activate.ps1
        .\build_windows.bat
      shell: pwsh
    
    - name: Create versioned ZIP archive
      working-directory: audio_processor/dist
      run: |
        $VERSION = "${{ steps.version.outputs.version }}"
        Compress-Archive -Path LU2MET_NR.exe -DestinationPath "LU2MET_NR-windows-$VERSION.zip"
      shell: pwsh
    
    - name: Upload Windows app
      uses: actions/upload-artifact@v4
      with:
        name: LU2MET_NR-windows-${{ steps.version.outputs.version }}
        path: audio_processor/dist/LU2MET_NR-windows-${{ steps.version.outputs.version }}.zip
        retention-days: 90

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Generate release version
      id: version
      run: |
        VERSION="v1.0.0-beta-$(date +'%Y%m%d-%H%M%S')-$(git rev-parse --short HEAD)"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
        echo "Generated version: $VERSION"
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts
    
    - name: List artifacts
      run: |
        echo "Downloaded artifacts:"
        ls -R ./artifacts/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: LU2MET NR Filter ${{ steps.version.outputs.version }}
        body: |
          ## 📻 LU2MET NR Filter - Automated Build
          
          **Build Date:** ${{ steps.version.outputs.date }}  
          **Commit:** ${{ github.sha }}  
          **Branch:** ${{ github.ref_name }}
          
          ### 📦 Downloads
          - **macOS**: `LU2MET_NR-macos-${{ steps.version.outputs.version }}.zip`
          - **Windows**: `LU2MET_NR-windows-${{ steps.version.outputs.version }}.zip`
          
          ### ✨ Features
          - NovaSDR Spectral Noise Reduction
          - Input Gain Control (1-100%, logarithmic)
          - Output Volume Control (10-400%, logarithmic)
          - SSB and CW modes
          - Audio recording (MP3/WAV)
          
          ### 📝 Changes
          ```
          ${{ github.event.head_commit.message }}
          ```
          
          ### 🔧 Installation
          - **macOS**: Extract ZIP, move to Applications, right-click → Open (first time)
          - **Windows**: Extract ZIP, run LU2MET_NR.exe
          
          ---
          **73 de LU2MET** 📻
        files: ./artifacts/**/*.zip
        draft: false
        prerelease: true
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
