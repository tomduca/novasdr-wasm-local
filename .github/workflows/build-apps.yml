name: Build macOS and Windows Apps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    
    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          novasdr_nr_py/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Create virtual environment
      run: |
        cd audio_processor
        python3 -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
    
    - name: Install Python dependencies
      run: |
        cd audio_processor
        source venv/bin/activate
        pip install PyQt5 sounddevice scipy pydub numpy maturin pyinstaller
    
    - name: Build NovaSDR Rust module
      run: |
        cd novasdr_nr_py
        source ../audio_processor/venv/bin/activate
        maturin develop --release
    
    - name: Verify NovaSDR module
      run: |
        cd audio_processor
        source venv/bin/activate
        python3 -c "import novasdr_nr; print('✓ NovaSDR loaded:', novasdr_nr.__file__)"
    
    - name: Build macOS app
      run: |
        cd audio_processor
        source venv/bin/activate
        ./build_macos.sh
    
    - name: Create DMG (optional)
      run: |
        cd audio_processor/dist
        # Create a simple zip for now
        zip -r LU2MET_NR-macos.zip LU2MET_NR.app
    
    - name: Upload macOS app
      uses: actions/upload-artifact@v4
      with:
        name: LU2MET_NR-macos
        path: audio_processor/dist/LU2MET_NR-macos.zip
        retention-days: 30

  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    
    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          novasdr_nr_py/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Create virtual environment
      run: |
        cd audio_processor
        python -m venv venv
        .\venv\Scripts\Activate.ps1
        pip install --upgrade pip
      shell: pwsh
    
    - name: Install Python dependencies
      run: |
        cd audio_processor
        .\venv\Scripts\Activate.ps1
        pip install PyQt5 sounddevice scipy pydub numpy maturin pyinstaller
      shell: pwsh
    
    - name: Build NovaSDR Rust module
      run: |
        cd novasdr_nr_py
        ..\audio_processor\venv\Scripts\Activate.ps1
        maturin develop --release
      shell: pwsh
    
    - name: Verify NovaSDR module
      run: |
        cd audio_processor
        .\venv\Scripts\Activate.ps1
        python -c "import novasdr_nr; print('✓ NovaSDR loaded:', novasdr_nr.__file__)"
      shell: pwsh
    
    - name: Build Windows app
      run: |
        cd audio_processor
        .\venv\Scripts\Activate.ps1
        .\build_windows.bat
      shell: pwsh
    
    - name: Create ZIP archive
      run: |
        cd audio_processor\dist
        Compress-Archive -Path LU2MET_NR.exe -DestinationPath LU2MET_NR-windows.zip
      shell: pwsh
    
    - name: Upload Windows app
      uses: actions/upload-artifact@v4
      with:
        name: LU2MET_NR-windows
        path: audio_processor/dist/LU2MET_NR-windows.zip
        retention-days: 30

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: LU2MET_NR-macos
        path: ./artifacts
    
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: LU2MET_NR-windows
        path: ./artifacts
    
    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-${{ steps.date.outputs.date }}-${{ github.run_number }}
        name: Build ${{ steps.date.outputs.date }} (#${{ github.run_number }})
        body: |
          Automated build from commit ${{ github.sha }}
          
          ## Downloads
          - **macOS**: LU2MET_NR-macos.zip
          - **Windows**: LU2MET_NR-windows.zip
          
          ## Changes
          ${{ github.event.head_commit.message }}
        files: |
          ./artifacts/LU2MET_NR-macos.zip
          ./artifacts/LU2MET_NR-windows.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
